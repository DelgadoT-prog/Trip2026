<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Crear Trip</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body class="container mt-4">
	
<div th:replace="fragments/menu :: menu-principal"></div>

<h3 class="mb-4">Datos del Trip</h3>

<form action="/trips/save" method="post">

<div class="row mb-3">

<div class="col-md-4">
<label class="form-label">Nombre</label>
<input type="text" name="nombre" class="form-control" placeholder="Título del trip">
</div>

<div class="col-md-8">
<label class="form-label">Descripción</label>
<input type="text" name="descripcion" class="form-control" placeholder="Breve descripción del trip">
</div>

</div>


<div class="row mb-3">

<div class="col-md-3">
<label class="form-label">Categoría</label>
<select name="categoria" class="form-control">
<option>En la montaña</option>
<option>En la playa</option>
<option>En la ciudad</option>
</select>
</div>

<div class="col-md-3">
<label class="form-label">Status</label>
<select name="status" class="form-control">
<option>Creada</option>
<option>Activa</option>
<option>Finalizada</option>
</select>
</div>

<div class="col-md-3">
<label class="form-label">Fecha de Publicación</label>
<input type="date" name="fecha" class="form-control">
</div>

<div class="col-md-3 mt-4">
<label class="form-label">Destacado</label><br>

<input type="radio" name="destacado" value="true"> Destacado
<input type="radio" name="destacado" value="false" class="ms-3"> No Destacado

</div>

</div>


<div class="row mb-3">

<div class="col-md-3">
<label class="form-label">Costo del Trip</label>
<input type="number" name="costo" class="form-control" placeholder="Costo del trip">
</div>

<div class="col-md-4">
<label class="form-label">Imagen</label>
<input type="file" class="form-control">
</div>

</div>


<div class="mb-3">
<label class="form-label">Detalles</label>
<textarea name="detalles" class="form-control" rows="4"></textarea>
</div>


<button type="submit" class="btn btn-primary">
Guardar
</button>

<a href="/" class="btn btn-secondary">
Cancelar
</a>

</form>

</body>
</html>
