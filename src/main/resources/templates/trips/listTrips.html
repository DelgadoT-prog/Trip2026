<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Lista de Trips</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div th:replace="fragments/menu :: menu-principal"></div>

<div class="container mt-5">

<h2>Lista de Trips</h2>

<table class="table table-striped">

<tr>
<th>Nombre</th>
<th>Destino</th>
<th>Fecha</th>
</tr>

<tr th:each="trip : ${trips}">
<td th:text="${trip.nombre}"></td>
<td th:text="${trip.destino}"></td>
<td th:text="${trip.fecha}"></td>
</tr>

</table>

<a href="/trips/create" class="btn btn-primary">Crear Trip</a>

</div>

</body>
</html>
